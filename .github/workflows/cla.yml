name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  cla_assistant:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'recheck' ||
       github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
       github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ASSISTANT_PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/${{ github.repository }}/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: bot*,dependabot[bot],github-actions[bot],claude,sprudlevann
          signed-commit-message: 'chore: $contributorName signed the CLA'
          custom-notsigned-prcomment: |
            Takk for bidraget ditt! 🎉

            Før vi kan merge denne pull requesten, må du signere **Contributor License Agreement (CLA)** for Happy Pixel AS.

            **Slik signerer du:**
            Skriv følgende kommentar i denne PR-en:

            > I have read the CLA Document and I hereby sign the CLA

            Du kan lese CLA-en her: [CLA.md](https://github.com/${{ github.repository }}/blob/main/CLA.md)

            Har du allerede signert tidligere? Skriv `recheck` som kommentar for å verifisere på nytt.
          custom-pr-sign-comment: |
            Takk for at du har signert CLA-en! ✅ Vi kan nå vurdere bidraget ditt.
