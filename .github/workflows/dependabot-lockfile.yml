name: Dependabot lockfile update

# Dependabot only updates package.json for npm-ecosystem PRs — it has no
# native support for bun.lock, so `bun install --frozen-lockfile` in CI
# fails on every dependency bump. This regenerates and pushes the lockfile
# back onto the PR branch before the verify job runs.
on:
  pull_request_target:
    branches: [main]

permissions:
  contents: write

jobs:
  update-lockfile:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Update lockfile
        run: bun install

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- bun.lock; then
            echo "Lockfile already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "Update bun.lock"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
