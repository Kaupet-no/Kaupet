# SOPS-konfigurasjon for Kaupet.
# Hver utvikler legger sin age-offentlige nøkkel til i listen under for å få
# lese/skrivetilgang. Etter at en nøkkel er lagt til, må noen med eksisterende
# tilgang kjøre `bun run secrets:rekey` for å re-kryptere mot den nye nøkkelen.
#
# Generer din egen nøkkel med:
#   age-keygen -o "%APPDATA%\sops\age\keys.txt"                                  (Windows)
#   age-keygen -o "$HOME/Library/Application Support/sops/age/keys.txt"          (macOS)
#   age-keygen -o ~/.config/sops/age/keys.txt                                    (Linux)
# og send den offentlige nøkkelen (linjen som starter med "age1...") til
# noen som allerede har tilgang.

keys:
  - &andreas age109lmrhdpc5wz2m6p26eyhq28kf2jxsfd2xv3ykvufc7jk534pfksg89gqf
  # - &CI age1...   # legg til CI-nøkkelen her når GitHub Actions skal dekryptere

creation_rules:
  - path_regex: secrets[/\\].*\.env$
    input_type: dotenv
    output_type: dotenv
    key_groups:
      - age:
          - *andreas
          # - *CI
