<!doctype html>
<html lang="nb">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Ingen forbindelse — Kaupet</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fbf9f3;
        --surface: #ffffff;
        --fg: #1a1a1a;
        --muted: #6b6b6b;
        --primary: #2f5d44;
        --accent: #d97a3c;
        --primary-fg: #fbf9f3;
        --border: #e5e1d6;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --bg: #0f0f0f;
          --surface: #1a1a1a;
          --fg: #f5f5f5;
          --muted: #a3a3a3;
          --border: #2a2a2a;
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        padding-top: max(24px, env(safe-area-inset-top));
        padding-bottom: max(24px, env(safe-area-inset-bottom));
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 32px 24px;
        max-width: 380px;
        width: 100%;
        text-align: center;
        box-shadow: 0 10px 30px -20px rgba(0, 0, 0, 0.25);
      }
      .logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        display: block;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
      }
      button {
        appearance: none;
        border: none;
        background: var(--primary);
        color: var(--primary-fg);
        font: inherit;
        font-weight: 600;
        font-size: 15px;
        padding: 12px 24px;
        border-radius: 10px;
        cursor: pointer;
        width: 100%;
        transition: opacity 0.15s ease;
      }
      button:active {
        opacity: 0.85;
      }
      .hint {
        margin-top: 16px;
        font-size: 13px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card" role="alert" aria-live="polite">
      <img src="assets/logo.svg" alt="Kaupet" class="logo" />
      <h1>Kunne ikke koble til Kaupet</h1>
      <p>Vi når ikke kaupet.no akkurat nå. Sjekk internettforbindelsen din og prøv på nytt.</p>
      <button type="button" onclick="window.location.replace('https://kaupet.no/')">
        Prøv på nytt
      </button>
      <p class="hint">Hvis problemet vedvarer, prøv igjen om noen minutter.</p>
    </main>
  </body>
</html>
